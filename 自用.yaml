# 机场订阅
proxy-providers:
  免费1:
    url: "*****"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.google.com/generate_204
      interval: 300
    proxy: 直连
    #header:
    #- "mihomo"  #拉取文件类型
    override:
      skip-cert-verify: true  #跳过证书
      
  
      

#global-ua: mihomo   #拉取文件类型
 
# 全局配置 
port: 9870         # HTTP(S) 代理端口
socks-port: 9871   # SOCKS5 代理端口
redir-port: 9872
mixed-port: 9873
tproxy-port: 9874
allow-lan: true     #局域网
bind-address: "*"   #允许局域网ip
ipv6: false     
unified-delay: true
tcp-concurrent: true
log-level: warning
find-proccess-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true 
  
# 面板
secret: MHIVE
external-controller: "0.0.0.0:9080"
external-ui: dist
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:  #强制嗅探
  
  skip-domain:  #忽略嗅探
    - "Mijia Cloud"
    - "+.push.apple.com"


# 入站
tun:
  enable: true 
  stack: mixed  # system(原生容器 / RunC)/gvisor(安全沙箱容器)/mixed(混合模式)
  #dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  #route-exclude-address-set:

# DNS模块  
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist #fake-ip黑名单模式
  fake-ip-filter: #黑名单
    - '*.lan'               # 局域网后缀
    - '*.localdomain'
    - "rule-set:大陆IP"
    - "rule-set:私有网络" 
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  

    
proxies:
  - {name: 直连, type: direct}
  - {name: 断开, type: reject}    
    
# 极简出站策略   
proxy-groups:
  - {name: 🚀 代理, type: select, proxies: [♻️ 自动, 🌐 全部, 直连]}
  - {name: 🐟 漏网, type: select, proxies: [🌐 全部, 直连, 断开]}
  - {name: ✍️ 手动, type: select, proxies: [🌐 全部, 直连, 断开]}
  - {name: ♻️ 自动, type: url-test, url: "https://www.google.com/generate_204", interval: 300, tolerance: 50, include-all: true, filter: "^((?!(直连)).)*$"}
  - {name: 🛑 广告拦截, type: select, proxies: [直连, 断开]}
  - {name: 🌐 全部, type: select, include-all: true}
  
# 规则匹配
rules:
  - RULE-SET,广告,🛑 广告拦截
  - RULE-SET,局域网IP,直连
  - RULE-SET,直连域名,直连
  - RULE-SET,私有网络,直连
  - RULE-SET,苹果直连,直连
  - RULE-SET,直连软件,直连
  - RULE-SET,代理域名,🚀 代理
  - RULE-SET,GFW域名,🚀 代理
  - RULE-SET,TGIP,🚀 代理
  - RULE-SET,非中域名,✍️ 手动
  - RULE-SET,大陆IP,✍️ 手动
  - MATCH,🐟 漏网


rule-providers:
  广告:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
  苹果直连:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./ruleset/apple.yaml
    interval: 86400

  代理域名:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 86400

  直连域名:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 86400

  私有网络:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./ruleset/private.yaml
    interval: 86400

  GFW域名:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./ruleset/gfw.yaml
    interval: 86400

  非中域名:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/tld-not-cn.txt"
    path: ./ruleset/tld-not-cn.yaml
    interval: 86400

  TGIP:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt"
    path: ./ruleset/telegramcidr.yaml
    interval: 86400

  大陆IP:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt"
    path: ./ruleset/cncidr.yaml
    interval: 86400

  局域网IP:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt"
    path: ./ruleset/lancidr.yaml
    interval: 86400

  直连软件:
    type: http
    behavior: classical
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt"
    path: ./ruleset/applications.yaml
    interval: 86400
