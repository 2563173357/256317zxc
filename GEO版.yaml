#global-ua: mihomo   #拉取文件类型
 
# 全局配置 
port: 9870         # HTTP(S) 代理端口
socks-port: 9871   # SOCKS5 代理端口
#redir-port: 9872
#mixed-port: 9873
#proxy-port: 9874
allow-lan: true     #局域网
bind-address: "*"   #允许局域网ip
ipv6: false     
unified-delay: true
tcp-concurrent: true
log-level: warning
find-proccess-mode: 'off'
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true 
  
# 面板
secret: MHIVE
external-controller: "0.0.0.0:9090"
#external-ui: dist
#external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:  #强制嗅探
  
  skip-domain:  #忽略嗅探
    - "Mijia Cloud"
    - "+.push.apple.com"


# 入站
tun:
  enable: true 
  stack: mixed  # system(原生容器 / RunC)/gvisor(安全沙箱容器)/mixed(混合模式)
  #dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  #route-exclude-address-set:

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053

  # =========================
  # 🚀 核心模式
  # =========================
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.home.arpa"
    - "localhost"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"

  # =========================
  # ⚙️ 基础DNS（仅用于初始解析）
  # =========================
  default-nameserver:
    - 223.5.5.5        # 阿里
    - 119.29.29.29     # 腾讯

  # =========================
  # 🧠 直连解析（国内域名）
  # 👉 走 AdGuard Home
  # =========================
  nameserver:
    - 192.168.2.3      # AdGuard Home（核心）

  # =========================
  # 🌍 代理域名解析（避免污染）
  # =========================
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  # =========================
  # 🔄 回退DNS（防污染兜底）
  # =========================
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

  # =========================
  # 🧭 精准分流DNS（关键）
  # =========================
  nameserver-policy:
    geosite:cn:
      - 192.168.2.3

    geosite:private:
      - 192.168.2.3

    geosite:geolocation-!cn:
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query

    geosite:openai:
      - https://1.1.1.1/dns-query

    geosite:anthropic:
      - https://1.1.1.1/dns-query

    geosite:google:
      - https://dns.google/dns-query

  # =========================
  # 🧪 性能优化
  # =========================
  cache-algorithm: arc
  respect-rules: true
  
  
proxy-groups:
# =========================
# 🟦 功能层（统一走节点选择）
# =========================
  - {name: 微软苹果, type: select, proxies: [国内直连, 手动全部, 自动选择], icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Microsoft_365.png"}
  - {name: 游戏, type: select, proxies: [国内直连,自动选择, 手动全部], icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Game.png"}
  - {name: AI, type: select, proxies: [自动选择,国内直连, 手动全部], icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/ChatGPT.png"}
  - {name: 视频, type: select, proxies: [自动选择,国内直连, 手动全部], icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/YouTube.png"}
  - {name: 默认代理, type: select, proxies: [自动选择,手动全部, 国内直连], icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Google.png"}
# =========================
# 🧭 核心出口控制层
# =========================
  - {name: 自动选择, type: url-test, url: "https://www.google.com/generate_204", interval: 300, tolerance: 50, include-all: true, filter: "^((?!(直连)).)*$",icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Auto_Link.png"} 
  - {name: 手动全部, type: select, include-all: true, url: "https://www.google.com/generate_204", filter: "^((?!(直连)).)*$",icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Flight.png"}
# =========================
# 🛡 控制层
# =========================
  - {name: 国内直连, type: select, proxies: [DIRECT], url: "http://connectivitycheck.platform.hicloud.com/generate_204", icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/China.png"}
  - {name: 拒绝连接, type: select, proxies: [REJECT], url: "http://connectivitycheck.platform.hicloud.com/generate_204", icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Forbidden.png"}
  - {name: 广告拦截, type: select, proxies: [拒绝连接, 国内直连, 自动选择], icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Adguard.png"}  
  - {name: 漏网, type: select, proxies: [国内直连, 自动选择, 拒绝连接], icon: "https://raw.githubusercontent.com/2563173357/TB/main/Icon/Color/Large/Fish_b.png"}


  
  
